<!doctype html>
<html lang="{{ site.Language.Locale | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("certer-theme");
        if (theme === "dark" || theme === "light") {
          document.documentElement.dataset.theme = theme;
        }
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ "css/custom.css?v=layout-4" | relURL }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="Certer documentation home">
        <img class="brand-mark" src="{{ "img/certer-logo.svg" | relURL }}" alt="">
        <span>Certer</span>
      </a>
      <nav class="header-nav" aria-label="Primary navigation">
        {{ with site.GetPage "section" "docs" }}
        <a href="{{ .RelPermalink }}">Documentation</a>
        {{ end }}
        <a href="https://github.com/Menschomat/certer">GitHub</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Theme: auto" title="Theme: auto">
        <svg class="theme-icon theme-icon-auto" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M5 5.5A2.5 2.5 0 0 1 7.5 3h9A2.5 2.5 0 0 1 19 5.5V14H5V5.5Z"/>
          <path d="M3 18h18"/>
          <path d="M8.5 18 10 14"/>
          <path d="M15.5 18 14 14"/>
        </svg>
        <svg class="theme-icon theme-icon-dark" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20 14.3A7.6 7.6 0 0 1 9.7 4a8.4 8.4 0 1 0 10.3 10.3Z"/>
        </svg>
        <svg class="theme-icon theme-icon-light" aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2"/>
          <path d="M12 20v2"/>
          <path d="m4.9 4.9 1.4 1.4"/>
          <path d="m17.7 17.7 1.4 1.4"/>
          <path d="M2 12h2"/>
          <path d="M20 12h2"/>
          <path d="m4.9 19.1 1.4-1.4"/>
          <path d="m17.7 6.3 1.4-1.4"/>
        </svg>
      </button>
    </div>
  </header>

  {{ block "main" . }}{{ end }}

  <footer class="site-footer">
    <div class="footer-inner">
      <span>{{ site.Params.footer.copyright }}</span>
    </div>
  </footer>

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    const colorScheme = window.matchMedia("(prefers-color-scheme: dark)");
    const themeToggle = document.querySelector("[data-theme-toggle]");
    const themes = ["auto", "dark", "light"];
    const themeLabel = (theme) => `Theme: ${theme === "light" ? "lite" : theme}`;
    const storedTheme = () => {
      try {
        return localStorage.getItem("certer-theme") || "auto";
      } catch (_) {
        return "auto";
      }
    };
    const isDarkTheme = () => {
      const theme = storedTheme();
      return theme === "dark" || (theme === "auto" && colorScheme.matches);
    };
    const applyTheme = (theme) => {
      if (theme === "dark" || theme === "light") {
        document.documentElement.dataset.theme = theme;
      } else {
        delete document.documentElement.dataset.theme;
        theme = "auto";
      }
      try {
        theme === "auto" ? localStorage.removeItem("certer-theme") : localStorage.setItem("certer-theme", theme);
      } catch (_) {}
      if (themeToggle) {
        themeToggle.dataset.themeToggle = theme;
        themeToggle.setAttribute("aria-label", themeLabel(theme));
        themeToggle.title = themeLabel(theme);
      }
    };

    applyTheme(storedTheme());
    themeToggle?.addEventListener("click", () => {
      const current = themeToggle.dataset.themeToggle || storedTheme();
      applyTheme(themes[(themes.indexOf(current) + 1) % themes.length]);
    });
    colorScheme.addEventListener("change", () => {
      if (storedTheme() === "auto") applyTheme("auto");
    });

    mermaid.initialize({ startOnLoad: true, securityLevel: "strict", theme: isDarkTheme() ? "dark" : "default" });
  </script>
</body>
</html>
