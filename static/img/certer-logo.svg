<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Certer logo</title>
  <desc id="desc">A modern certificate mark with a verification seal.</desc>
  <defs>
