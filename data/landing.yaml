# Certer Custom Hero Section
myHero:
  enable: true
  weight: 10
  template: hero
  badge:
    text: "v1.0.0"
    color: "primary"
  title: "Certer"
  subtitle: "Sleek, containerized certificate manager built on Lego, Let's Encrypt, and ZeroSSL."
  ctaButton:
    icon: "rocket_launch"
    btnText: "Get Started"
    url: "/certer-docs/docs/" # Hardcoded subpath matching GitHub Pages deploy URL
  cta2Button:
    icon: "code"
    btnText: "GitHub"
    url: "https://github.com/Menschomat/certer"

# Explicitly disable the theme's default landing page sections
hero:
  enable: false

featureGrid:
  enable: false

imageCompare:
  enable: false
