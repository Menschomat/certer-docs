# Certer Custom Hero Section (Overrides theme default hero)
hero:
  enable: true
  weight: 10
  template: hero
  badge:
    text: "v1.0.0"
    color: "primary"
  title: "Certer"
  subtitle: "Secure, centralized SSL/TLS automation for isolated networks."
  info: "Stop distributing powerful DNS API credentials to every backend server, and stop opening outbound internet access for ACME validation.\n\nCerter centralizes all ACME negotiations (Let's Encrypt and ZeroSSL) in a single secure daemon. Your backend servers remain isolated in private networks, pulling their certificates locally using low-privilege, scoped bearer tokens and simple `curl` requests."
  image:
    path: "img"
    filename: "hero_illustration.jpg"
    alt: "Certer Secure Centralized Cert Manager"
    boxShadow: true
    rounded: true
  ctaButton:
    icon: "rocket_launch"
    btnText: "Get Started"
    url: "/certer-docs/docs/" # Hardcoded subpath matching GitHub Pages deploy URL
  cta2Button:
    icon: "code"
    btnText: "GitHub"
    url: "https://github.com/Menschomat/certer"

# Certer Custom Feature Grid (Overrides theme default featureGrid)
featureGrid:
  enable: true
  weight: 20
  template: "feature grid"
  items:
    - icon: "published_with_changes"
      title: "Automated Renewals"
      text: "Background scheduler checks certificate expirations and triggers renewal checks automatically every 5 minutes."
    - icon: "layers"
      title: "Container Native"
      text: "Designed to run seamlessly inside Docker, Docker Compose, or Kubernetes environments out of the box."
    - icon: "vpn_key"
      title: "Argon2id Hashing"
      text: "Hardened security using the Argon2id KDF and constant-time comparisons to prevent timing side-channel attacks."
    - icon: "integration_instructions"
      title: "Lego-Powered"
      text: "Built on top of the Lego library to support ACME providers and solve DNS-01 and HTTP-01 challenges easily."
    - icon: "dns"
      title: "Terraform Integration"
      text: "Provision and manage teams, keys, and certificates declaratively using our custom Certer Terraform provider."
    - icon: "security"
      title: "Scoped Credentials"
      text: "Restrict token access to specific teams or individual certificate configurations for fine-grained multi-tenancy."

# Disable the default image compare section
imageCompare:
  enable: false
